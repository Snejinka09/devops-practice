stages:
    - validate
    -  deploy

validate-job:
  stage: validate
  image: docker:24-cli
  script: docker compose config

deploy-job:
  stage: deploy
  image: docker:24-cli
  script: docker compose -p devops-practice pull && docker compose -p devops-practice up -d
  rules:
    - if: $CI_COMMIT_BRANCH == "main"